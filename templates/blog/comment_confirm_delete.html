{% extends 'base.html' %}
{% block title %}Delete comment - Life Log{% endblock %}

{% block content %}
<article class="card">
    <h2 style="margin:0 0 1rem;">Delete comment</h2>
    <p style="color:#666;">This cannot be undone.</p>

    <div style="padding:12px; border:1px solid #eee; border-radius:8px; margin:12px 0; white-space:pre-wrap;">
        {{ comment.content }}
    </div>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{{ post.get_absolute_url }}#comments" class="btn btn-secondary">Cancel</a>
    </form>
</article>
{% endblock %}
