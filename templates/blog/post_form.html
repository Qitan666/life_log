{% extends 'base.html' %}
{% block title %}{{ title }} - Life Log{% endblock %}
{% block content %}
<div class="card">
    <h2 style="margin-top: 0;">{{ title }}</h2>
    <form method="post" action="" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="form-errors">{{ field.errors }}</div>{% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save</button>
        {% if post %}<a href="{% url 'blog:post_detail' post.pk %}" class="btn btn-secondary">Cancel</a>{% else %}<a href="{% url 'blog:post_list' %}" class="btn btn-secondary">Cancel</a>{% endif %}
    </form>
</div>
{% endblock %}
