{% extends 'base.html' %}
{% block title %}Delete "{{ post.title }}" - Life Log{% endblock %}
{% block content %}
<div class="card">
    <h2>Confirm delete</h2>
    <p>Are you sure you want to delete the post "{{ post.title }}"? This operation cannot be undone.</p>
    <form method="post" action="{% url 'blog:post_delete' post.pk %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'blog:post_detail' post.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
